<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }
        </script><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Israel VoteCompass</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans">
  <div class="container mx-auto p-4 max-w-3xl">
    <h1 class="text-3xl font-bold text-center mb-6">Israel VoteCompass</h1>
    <div id="quiz" class="bg-white p-6 rounded-lg shadow-md">
      <h2 class="text-xl font-semibold mb-4">Question <span id="questionNumber">1</span>/<span id="totalQuestions"></span></h2>
      <p id="questionText" class="mb-4"></p>
      <div class="space-y-4">
        <button class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 answer" data-value="2">Strongly Agree</button>
        <button class="w-full bg-blue-400 text-white py-2 rounded hover:bg-blue-500 answer" data-value="1">Agree</button>
        <button class="w-full bg-gray-400 text-white py-2 rounded hover:bg-gray-500 answer" data-value="0">Neutral</button>
        <button class="w-full bg-blue-400 text-white py-2 rounded hover:bg-blue-500 answer" data-value="-1">Disagree</button>
        <button class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 answer" data-value="-2">Strongly Disagree</button>
      </div>
      <div class="mt-6 flex justify-between">
        <button id="prev" class="bg-gray-300 text-gray-800 py-2 px-4 rounded hover:bg-gray-400">Previous</button>
        <button id="next" class="bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">Next</button>
      </div>
    </div>
    <div id="results" class="hidden bg-white p-6 rounded-lg shadow-md mt-6">
      <h2 class="text-xl font-semibold mb-4">Your Political Alignment</h2>
      <canvas id="compassChart" class="mb-4"></canvas>
      <p id="resultText" class="text-center"></p>
      <button id="restart" class="mt-4 bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">Take Quiz Again</button>
    </div>
  </div>

  <script>
    const questions = [
      { text: "Israel should prioritize security and military strength over diplomatic solutions.", axis: "security" },
      { text: "The government should increase funding for social welfare programs.", axis: "economic" },
      { text: "Settlements in the West Bank should be expanded.", axis: "security" },
      { text: "The government should reduce taxes to stimulate economic growth.", axis: "economic" },
      { text: "Religious laws should play a larger role in Israeli governance.", axis: "religious" },
      { text: "A two-state solution is a viable path to peace with the Palestinians.", axis: "security" },
      { text: "The government should invest more in public transportation infrastructure.", axis: "economic" },
      { text: "Haredi exemptions from military service should be maintained.", axis: "religious" },
      { text: "Israel should strengthen ties with the United States over other global allies.", axis: "security" },
      { text: "Economic inequality in Israel needs to be addressed through government intervention.", axis: "economic" }
    ];

    const parties = [
      { name: "Likud", security: 4, economic: 3, religious: 2 },
      { name: "Yesh Atid", security: 1, economic: 1, religious: -2 },
      { name: "National Unity", security: 3, economic: 0, religious: 0 },
      { name: "Shas", security: 2, economic: 2, religious: 4 },
      { name: "United Torah Judaism", security: 1, economic: 1, religious: 5 },
      { name: "Religious Zionist Party", security: 5, economic: 2, religious: 3 },
      { name: "Labor", security: -1, economic: -3, religious: -2 },
      { name: "Meretz", security: -2, economic: -4, religious: -3 }
    ];

    let currentQuestion = 0;
    let userScores = { security: 0, economic: 0, religious: 0 };
    const totalQuestions = questions.length;

    document.getElementById("totalQuestions").textContent = totalQuestions;
    displayQuestion();

    function displayQuestion() {
      document.getElementById("questionNumber").textContent = currentQuestion + 1;
      document.getElementById("questionText").textContent = questions[currentQuestion].text;
      document.getElementById("prev").disabled = currentQuestion === 0;
    }

    document.querySelectorAll(".answer").forEach(button => {
      button.addEventListener("click", () => {
        const value = parseInt(button.dataset.value);
        const axis = questions[currentQuestion].axis;
        userScores[axis] += value;
        currentQuestion++;
        if (currentQuestion < totalQuestions) {
          displayQuestion();
        } else {
          showResults();
        }
      });
    });

    document.getElementById("prev").addEventListener("click", () => {
      if (currentQuestion > 0) {
        currentQuestion--;
        displayQuestion();
      }
    });

    document.getElementById("next").addEventListener("click", () => {
      if (currentQuestion < totalQuestions - 1) {
        currentQuestion++;
        displayQuestion();
      }
    });

    document.getElementById("restart").addEventListener("click", () => {
      currentQuestion = 0;
      userScores = { security: 0, economic: 0, religious: 0 };
      document.getElementById("quiz").classList.remove("hidden");
      document.getElementById("results").classList.add("hidden");
      displayQuestion();
    });

    function showResults() {
      document.getElementById("quiz").classList.add("hidden");
      document.getElementById("results").classList.remove("hidden");

      const distances = parties.map(party => ({
        name: party.name,
        distance: Math.sqrt(
          Math.pow(party.security - userScores.security, 2) +
          Math.pow(party.economic - userScores.economic, 2) +
          Math.pow(party.religious - userScores.religious, 2)
        )
      }));

      distances.sort((a, b) => a.distance - b.distance);
      const closestParty = distances[0].name;
      document.getElementById("resultText").textContent = `Your views are closest to ${closestParty}.`;

      const ctx = document.getElementById("compassChart").getContext("2d");
      new Chart(ctx, {
        type: "scatter",
        data: {
          datasets: [
            {
              label: "Your Position",
              data: [{ x: userScores.security, y: userScores.economic }],
              backgroundColor: "red",
              pointRadius: 10
            },
            ...parties.map(party => ({
              label: party.name,
              data: [{ x: party.security, y: party.economic }],
              backgroundColor: getPartyColor(party.name),
              pointRadius: 8
            }))
          ]
        },
        options: {
          scales: {
            x: { title: { display: true, text: "Security (Hawkish to Dovish)" }, min: -5, max: 5 },
            y: { title: { display: true, text: "Economic (Left to Right)" }, min: -5, max: 5 }
          }
        }
      });
    }

    function getPartyColor(partyName) {
      const colors = {
        "Likud": "#003087",
        "Yesh Atid": "#00A1D6",
        "National Unity": "#4B0082",
        "Shas": "#FFD700",
        "United Torah Judaism": "#000000",
        "Religious Zionist Party": "#228B22",
        "Labor": "#FF0000",
        "Meretz": "#008000"
      };
      return colors[partyName] || "#000000";
    }
  </script>
</body>
</html>
